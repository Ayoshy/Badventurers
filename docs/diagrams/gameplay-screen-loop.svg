<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1120" viewBox="0 0 1440 1120" role="img" aria-labelledby="title desc">
  <title id="title">Badventurers gameplay screen loop</title>
  <desc id="desc">Graphique des écrans actuels et futurs de Badventurers, organisé autour de la boucle ouvrir, collecter, améliorer, lancer une expédition et revenir.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#D0A24A" />
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#DED0A2" />
    </marker>
    <style>
      .bg { fill: #141512; }
      .zone { fill: #1C1D18; stroke: #50472F; stroke-width: 2; }
      .zone-title { fill: #FFF1C0; font: 700 20px "Segoe UI", Arial, sans-serif; }
      .title { fill: #FFF1C0; font: 800 34px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #DED0A2; font: 500 17px "Segoe UI", Arial, sans-serif; }
      .legend { fill: #DED0A2; font: 600 15px "Segoe UI", Arial, sans-serif; }
      .node-title { font: 800 17px "Segoe UI", Arial, sans-serif; }
      .node-status { font: 700 12px "Segoe UI", Arial, sans-serif; letter-spacing: .6px; }
      .current rect { fill: #2F695C; stroke: #FFF1C0; stroke-width: 2; }
      .current text { fill: #FFF1C0; }
      .state rect { fill: #32483F; stroke: #D0A24A; stroke-width: 2; }
      .state text { fill: #FFF1C0; }
      .mvp rect { fill: #FFF1BF; stroke: #D0A24A; stroke-width: 2; }
      .mvp text { fill: #211F1A; }
      .long rect { fill: #E8D7A0; stroke: #7B5531; stroke-width: 2; stroke-dasharray: 7 5; }
      .long text { fill: #211F1A; }
      .arrow { fill: none; stroke: #D0A24A; stroke-width: 3; marker-end: url(#arrow); }
      .soft-arrow { fill: none; stroke: #DED0A2; stroke-width: 2.5; stroke-dasharray: 7 6; marker-end: url(#arrow-soft); }
      .loop-label { fill: #DED0A2; font: 700 13px "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="1120" />

  <text x="60" y="58" class="title">Badventurers - boucle de gameplay et écrans</text>
  <text x="60" y="88" class="subtitle">Ouvrir la guilde, collecter le résultat, améliorer quelque chose, lancer une expédition, revenir plus tard.</text>

